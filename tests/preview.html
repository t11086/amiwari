<!DOCTYPE html>
<!-- スマホ幅(390px)検証用ラッパー。macOSのChromeはウィンドウ最小幅500pxのため、iframeで包んで撮る。
     使い方: preview.html?scr=hat&unlock=1&set-a1-rows=50 のように指定
     - scr=画面名 / unlock=1 で解除済み状態 / set-<inputのid>=値 で入力を流し込む -->
<html><head><meta charset="utf-8"><style>
body{margin:0;background:#999;display:flex;justify-content:center;padding:16px}
iframe{width:390px;height:844px;border:0;background:#fff}
</style></head><body>
<iframe id="f"></iframe>
<script>
const q = new URLSearchParams(location.search);
if (q.get('unlock') === '1') localStorage.setItem('amiwari-unlocked', '1');
const f = document.getElementById('f');
if (q.get('h')) f.style.height = q.get('h') + 'px'; // 縦長画面の全体確認用
f.src = '../index.html?scr=' + (q.get('scr') || 'home')
  + (q.get('install') ? '&install=' + q.get('install') : '');
f.onload = () => {
  const d = f.contentDocument, w = f.contentWindow;
  const pane = q.get('pane'); // pane=conv 等でタブを切り替える
  if (pane) d.querySelector(`.mode[data-mode="${pane}"]`)?.click();
  for (const [k, v] of q) {
    if (!k.startsWith('set-')) continue;
    const el = d.getElementById(k.slice(4));
    if (!el) continue;
    el.value = v;
    el.dispatchEvent(new w.Event(el.tagName === 'SELECT' ? 'change' : 'input', { bubbles: true }));
  }
};
</script>
</body></html>
