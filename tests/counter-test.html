<!doctype html>
<meta charset="utf-8">
<title>counter test</title>
<pre id="log"></pre>
<iframe id="f" style="width:400px;height:800px"></iframe>
<script>
const log = m => document.getElementById('log').textContent += m + '\n';
const f = document.getElementById('f');

// v2形式(編みかけごと・パーツなし)を仕込んでから読み込む(引き継ぎ検証)
localStorage.clear();
localStorage.setItem('amiwari-counter-v2', JSON.stringify({
  cur: 1,
  list: [
    { name: '編みかけ1', main: 12, sub: 3, target: 40 },
    { name: '冬の帽子', main: 7, sub: 0, target: 0 },
  ],
}));

let phase = 0;
f.onload = () => setTimeout(() => {
  const d = f.contentDocument, w = f.contentWindow;
  const $ = s => d.querySelector(s);
  const pjChips = () => [...d.querySelectorAll('#c-chips .chip')];
  const ptChips = () => [...d.querySelectorAll('#p-chips .chip')];
  if (phase === 0) {
    phase = 1;
    // v2引き継ぎ: 2件・選択位置・数値がパーツ1つとして入っているか
    log('pj chips=' + pjChips().map(c => c.textContent).join('/'));
    log('pt chips=' + ptChips().map(c => c.textContent).join('/'));
    log('migrated(cur=冬の帽子) main=' + $('#c-main').textContent);
    log('v2 key removed=' + (localStorage.getItem('amiwari-counter-v2') === null));
    // パーツを追加 → 新規はゼロで切り替わる
    ptChips().at(-1).click();
    log('pt add: chips=' + ptChips().map(c => c.textContent).join('/') + ' main=' + $('#c-main').textContent);
    // パーツ名を変更
    $('#p-name').value = '前身頃';
    $('#p-name').dispatchEvent(new w.Event('input'));
    log('pt renamed: ' + ptChips().map(c => c.textContent).join('/'));
    // 新パーツでカウント → パーツ間で値が独立しているか
    $('#c-plus').click(); $('#c-plus').click(); $('#c-plus').click();
    ptChips()[0].click();
    log('パーツ1 main=' + $('#c-main').textContent + ' (7のはず)');
    ptChips()[1].click();
    log('前身頃 main=' + $('#c-main').textContent + ' (3のはず)');
    // 編みかけを切り替え → そのパーツ構成に変わるか
    pjChips()[0].click();
    log('pj switch: pt chips=' + ptChips().map(c => c.textContent).join('/') + ' main=' + $('#c-main').textContent + ' (12のはず)');
    // リロードして永続化検証
    f.src = '../index.html?scr=counter&t=2';
  } else if (phase === 1) {
    phase = 2;
    log('--- reload ---');
    log('pj=' + pjChips().map(c => c.textContent).join('/'));
    log('pt=' + ptChips().map(c => c.textContent).join('/') + ' main=' + $('#c-main').textContent + ' (12のはず)');
    // 冬の帽子に切り替えて前身頃を削除
    pjChips()[1].click();
    ptChips()[1].click();
    w.confirm = () => true;
    $('#p-del').click();
    log('pt del: ' + ptChips().map(c => c.textContent).join('/') + ' main=' + $('#c-main').textContent + ' (7のはず)');
    // 残り1パーツを削除 → 空の1パーツが残るか
    $('#p-del').click();
    log('pt del last: ' + ptChips().map(c => c.textContent).join('/') + ' main=' + $('#c-main').textContent);
    // 編みかけごと削除
    $('#c-del').click();
    log('pj del: ' + pjChips().map(c => c.textContent).join('/'));
    log('DONE');
  }
}, 600);
f.src = '../index.html?scr=counter';
</script>
